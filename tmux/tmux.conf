# --- Initialization ---
source-file ~/.config/tmux/tmux.reset.conf

# Terminal color support
set-option -g default-terminal "tmux-256color"
set-option -g terminal-overrides ',xterm-256color:RGB'

# --- General Preferences ---
set -g prefix ^A
set -g base-index 1
set -g detach-on-destroy off
set-hook -g session-created 'if-shell "[ #{session_name} = scratch ]" "set-option -t scratch detach-on-destroy on"'
set -g escape-time 0
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on
set -g status-position top
setw -g mode-keys vi
set -g mouse on
set -g aggressive-resize off

# Pane styling
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# --- Plugin List ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'erikw/tmux-dark-notify'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'

# --- Auto Theme Switching Configuration ---
set -g @dark-notify-theme-path-light '~/.config/tmux/themes/catppuccin-latte.conf'
set -g @dark-notify-theme-path-dark '~/.config/tmux/themes/catppuccin-mocha.conf'

# --- Catppuccin Appearance (Shared Settings) ---
set -g @catppuccin_flavor 'mocha' # Initial fallback
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W#{?window_zoomed_flag,(),}"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_directory_text "#{b:pane_current_path}"

# --- Initialize TPM ---
run '~/.config/tmux/plugins/tpm/tpm'

# --- Status Bar Refresh (Runs after TPM) ---
set -g status-style 'bg=default'
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_session}"

# --- Apply correct theme on startup based on current system appearance ---
# dark-notify only fires on *changes*, not on initial launch
run-shell 'if defaults read -g AppleInterfaceStyle 2>/dev/null | grep -qi dark; then ~/.config/tmux/plugins/tmux-dark-notify/scripts/tmux-theme-mode.sh dark; else ~/.config/tmux/plugins/tmux-dark-notify/scripts/tmux-theme-mode.sh light; fi'

# --- Other Plugin Options ---
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="    " --border-label=" Open URL "'
set -g @continuum-restore 'on'
