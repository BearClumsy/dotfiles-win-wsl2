# Catppuccin Latte (Light) Theme Configuration
# This file is loaded when system is in light mode

set -g @catppuccin_flavor 'latte'

# Unset palette colors (set with -o on first load, must be cleared for flavor switch)
set -gu @thm_bg
set -gu @thm_fg
set -gu @thm_rosewater
set -gu @thm_flamingo
set -gu @thm_pink
set -gu @thm_mauve
set -gu @thm_red
set -gu @thm_maroon
set -gu @thm_peach
set -gu @thm_yellow
set -gu @thm_green
set -gu @thm_teal
set -gu @thm_sky
set -gu @thm_sapphire
set -gu @thm_blue
set -gu @thm_lavender
set -gu @thm_subtext_1
set -gu @thm_subtext_0
set -gu @thm_overlay_2
set -gu @thm_overlay_1
set -gu @thm_overlay_0
set -gu @thm_surface_2
set -gu @thm_surface_1
set -gu @thm_surface_0
set -gu @thm_mantle
set -gu @thm_crust

# Unset per-module options (also set with -o, not covered by palette reset)
set -gu @catppuccin_directory_color
set -gu @catppuccin_status_directory_icon_fg
set -gu @catppuccin_status_directory_text_fg
set -gu @catppuccin_status_directory_icon_bg
set -gu @catppuccin_session_color
set -gu @catppuccin_status_session_icon_fg
set -gu @catppuccin_status_session_text_fg
set -gu @catppuccin_status_session_icon_bg

run-shell '~/.config/tmux/plugins/tmux/catppuccin.tmux'
